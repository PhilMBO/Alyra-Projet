services:
  postgres:
    image: postgres:16-alpine
    container_name: verivo-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: verivo
      POSTGRES_PASSWORD: verivo_secret
      POSTGRES_DB: verivo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verivo -d verivo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: verivo-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "5555:5555"   # Prisma Studio (dev uniquement)
    environment:
      DATABASE_URL: postgresql://verivo:verivo_secret@postgres:5432/verivo?schema=shared
      PORT: 3001
      # UC-1 wallet-only
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod-please-use-long-random-string-here}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-localhost:3000}
      # UC-3 blockchain
      # En dev, Hardhat node tourne sur l'hote Windows (port 8545)
      # Depuis le container on passe par host.docker.internal
      RPC_URL: ${RPC_URL:-http://host.docker.internal:8545}
      CHAIN_ID: ${CHAIN_ID:-31337}
      # Cle privee du compte Hardhat #0 (dev uniquement, deterministe)
      VERIVO_OPERATOR_PRIVATE_KEY: ${VERIVO_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      VERIVO_FACTORY_ADDRESS: ${VERIVO_FACTORY_ADDRESS:-}
      BLOCK_EXPLORER_URL: ${BLOCK_EXPLORER_URL:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/scripts:/app/scripts
      # Artifacts Hardhat pour que le backend charge les ABIs
      - ./blockchain/artifacts:/app/blockchain/artifacts:ro
    extra_hosts:
      # Necessaire sur Linux pour que host.docker.internal fonctionne
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    # Mode DEV : utiliser l'image node officielle + monter le code + next dev
    # (plus de rebuild apres chaque modif, hot reload Next.js actif)
    image: node:20-alpine
    container_name: verivo-frontend
    restart: unless-stopped
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:3001
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${WALLET_CONNECT_PROJECT_ID}
      WATCHPACK_POLLING: "true"   # force le polling (Windows bind mount)
    volumes:
      - ./frontend:/app
      - /app/node_modules          # volume anonyme : garde les deps Linux compilees
      - /app/.next
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: verivo-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
