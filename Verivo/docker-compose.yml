services:
  postgres:
    image: postgres:16-alpine
    container_name: verivo-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: verivo
      POSTGRES_PASSWORD: verivo_secret
      POSTGRES_DB: verivo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verivo -d verivo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: verivo-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "5555:5555"   # Prisma Studio (dev uniquement)
    environment:
      DATABASE_URL: postgresql://verivo:verivo_secret@postgres:5432/verivo?schema=shared
      PORT: 3001
      # UC-1 wallet-only : JWT + domaine SIWE attendu
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod-please-use-long-random-string-here}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:-localhost:3000}
    volumes:
      # Mount du code source pour le dev : editions sans rebuild.
      # Le node_modules du container (compile pour Linux) est preserve
      # grace au volume anonyme qui override le mount du src.
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${WALLET_CONNECT_PROJECT_ID}
        BACKEND_URL: http://backend:3001
    container_name: verivo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: verivo-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
